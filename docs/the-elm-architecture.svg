<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The Elm Architecture: a single immutable Model, a pure update, and the view as a function of state. Model is rendered by view to Html, user input produces a Msg, update folds the Msg into a new Model and a Cmd, and the runtime performs the Cmd's effects whose results return as further Msgs.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1b1c28" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="12" y="12" width="876" height="536" rx="22" fill="#ffffff" stroke="#e3e5ef" stroke-width="1.5"/>

  <!-- title -->
  <text x="44" y="60" font-size="27" font-weight="700" fill="#1b1c28">The Elm Architecture</text>
  <text x="45" y="89" font-size="14.5" fill="#6b6d80">One immutable <tspan font-weight="600" fill="#4f46e5">Model</tspan>, a pure <tspan font-weight="600" fill="#4f46e5">update</tspan>, and the view as a function of state.</text>

  <!-- ===== solid loop: pure, synchronous ===== -->
  <g fill="none" stroke="#4f46e5" stroke-width="2.3">
    <line x1="304" y1="206" x2="595" y2="206" marker-end="url(#arrow)"/>   <!-- Model -> View -->
    <line x1="710" y1="256" x2="710" y2="369" marker-end="url(#arrow)"/>   <!-- View -> Msg -->
    <line x1="596" y1="420" x2="305" y2="420" marker-end="url(#arrow)"/>   <!-- Msg -> update -->
    <line x1="190" y1="370" x2="190" y2="257" marker-end="url(#arrow)"/>   <!-- update -> Model -->
  </g>

  <!-- ===== dashed: managed side effects ===== -->
  <g fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="7 6" opacity="0.92">
    <path d="M255,372 C300,348 350,338 392,331" marker-end="url(#arrow)"/>  <!-- update -> Effects (Cmd) -->
    <path d="M508,331 C552,338 604,350 644,371" marker-end="url(#arrow)"/>  <!-- Effects -> Msg (result) -->
  </g>

  <!-- arrow labels -->
  <text x="450" y="194" text-anchor="middle" font-size="13.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#1b1c28">view : Model &#8594; Html Msg</text>
  <text x="732" y="306" font-size="13" fill="#6b6d80">user input</text>
  <text x="732" y="324" font-size="13" fill="#6b6d80">&#8658; <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#1b1c28">Msg</tspan></text>
  <text x="450" y="446" text-anchor="middle" font-size="13" fill="#6b6d80">fed to the pure core</text>
  <text x="210" y="303" font-size="13" fill="#6b6d80">returns a new</text>
  <text x="210" y="321" font-size="13.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#1b1c28">(Model, Cmd Msg)</text>
  <rect x="299" y="344" width="38" height="17" fill="#ffffff"/>
  <text x="318" y="357" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#4f46e5">Cmd</text>
  <rect x="540" y="344" width="92" height="17" fill="#ffffff"/>
  <text x="586" y="357" text-anchor="middle" font-size="12.5" fill="#6b6d80">result &#8658; <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#4f46e5">Msg</tspan></text>

  <!-- ===== Effects node (center) ===== -->
  <g filter="url(#soft)">
    <rect x="372" y="246" width="156" height="86" rx="14" fill="#f1f2f8" stroke="#e3e5ef" stroke-width="1.3"/>
  </g>
  <text x="450" y="283" text-anchor="middle" font-size="16.5" font-weight="700" fill="#1b1c28">Effects</text>
  <text x="450" y="305" text-anchor="middle" font-size="11.5" fill="#6b6d80">HTTP &#183; time &#183; ports</text>
  <text x="450" y="321" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#9a9db2">src/Api/</text>

  <!-- ===== Model node (accent, the heart) ===== -->
  <g filter="url(#soft)">
    <rect x="78" y="158" width="224" height="96" rx="16" fill="#4f46e5"/>
  </g>
  <text x="190" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">Model</text>
  <text x="190" y="223" text-anchor="middle" font-size="12.5" fill="#dcdbfa">immutable single source of truth</text>
  <text x="190" y="240" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#c3c1f6">src/Model.elm</text>

  <!-- ===== View node ===== -->
  <g filter="url(#soft)">
    <rect x="598" y="158" width="224" height="96" rx="16" fill="#ffffff" stroke="#e3e5ef" stroke-width="1.5"/>
  </g>
  <text x="710" y="200" text-anchor="middle" font-size="22" font-weight="700" fill="#1b1c28">View</text>
  <text x="710" y="223" text-anchor="middle" font-size="12.5" fill="#6b6d80">renders the DOM from state</text>
  <text x="710" y="240" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#9a9db2">src/View.elm</text>

  <!-- ===== Msg node ===== -->
  <g filter="url(#soft)">
    <rect x="598" y="372" width="224" height="96" rx="16" fill="#ffffff" stroke="#4f46e5" stroke-width="1.6"/>
  </g>
  <text x="710" y="414" text-anchor="middle" font-size="22" font-weight="700" fill="#1b1c28">Msg</text>
  <text x="710" y="437" text-anchor="middle" font-size="12.5" fill="#6b6d80">every event &amp; effect result</text>
  <text x="710" y="454" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#9a9db2">type Msg</text>

  <!-- ===== update node ===== -->
  <g filter="url(#soft)">
    <rect x="78" y="372" width="224" height="96" rx="16" fill="#ffffff" stroke="#4f46e5" stroke-width="1.6"/>
  </g>
  <text x="190" y="412" text-anchor="middle" font-size="22" font-weight="700" fill="#1b1c28">update</text>
  <text x="190" y="434" text-anchor="middle" font-size="12.5" fill="#6b6d80">pure, total over every Msg</text>
  <text x="190" y="451" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#9a9db2">src/Update.elm</text>

  <!-- ===== legend ===== -->
  <g>
    <line x1="44" y1="514" x2="78" y2="514" stroke="#4f46e5" stroke-width="2.3"/>
    <text x="86" y="518" font-size="12.5" fill="#6b6d80">pure, synchronous loop</text>
    <line x1="276" y1="514" x2="310" y2="514" stroke="#4f46e5" stroke-width="2" stroke-dasharray="7 6"/>
    <text x="318" y="518" font-size="12.5" fill="#6b6d80">side effects, managed by the runtime</text>
    <text x="856" y="518" text-anchor="end" font-size="11.5" fill="#9a9db2">no manual state mutation &#183; no stray effects</text>
  </g>
</svg>
